name: Co-authored PR and Merge
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:     

permissions: 
  contents: write
  pull-requests: write

jobs:
  coauthor-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: 
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Create and Merge PR
        env: 
          # Using your PAT for everything
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # 1. Setup Git Identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Create a unique branch
          BRANCH_NAME="auto-branch-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          
          # 3. Create an empty commit with co-author trailer
          git commit --allow-empty \
            -m "Automated co-authored update" \
            -m "Co-authored-by: Name <omotoyedave4@gmail.com>"
          
          # 4. Push
          git push origin "$BRANCH_NAME"
          
          # 5. Create the PR and capture the URL
          PR_URL=$(gh pr create \
            --title "Scheduled Co-authored Update" \
            --body "Automated PR with co-author attribution." \
            --base main \
            --head "$BRANCH_NAME")
          
          echo "PR Created: $PR_URL"
          
          # 6. Merge immediately (Succeeds because PATs have higher authority)
          gh pr merge "$PR_URL" --squash --delete-branch --admin
