name: Co-authored PR and Merge
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:     

permissions: 
  contents: write
  pull-requests: write

jobs:
  coauthor-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: 
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Create and Merge PR
        env: 
          # This must match your secret name exactly (GH_PAT)
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Setup Git Identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create branch and empty commit
          BRANCH_NAME="auto-branch-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          git commit --allow-empty \
            -m "Automated co-authored update" \
            -m "Co-authored-by: Name <omotoyedave4@gmail.com>"
          
          # Push changes
          git push origin "$BRANCH_NAME"
          
          # Create and Merge PR
          PR_URL=$(gh pr create \
            --title "Scheduled Co-authored Update" \
            --body "Automated PR with co-author attribution." \
            --base main \
            --head "$BRANCH_NAME")
          
          gh pr merge "$PR_URL" --auto --squash --delete-branch --admin
